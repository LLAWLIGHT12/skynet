<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{{REPORT_TITLE}} — {{PROJECT_NAME}}</title>
  <style>
    :root {
      --bg: #f0f4f8;
      --surface: #ffffff;
      --text: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --hero-from: #0f172a;
      --hero-to: #1e40af;
      --accent: #6366f1;
      --radius: 14px;
      --shadow: 0 4px 24px rgba(15, 23, 42, 0.06);
      --font: "Segoe UI", system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      --mono: "Cascadia Code", "Fira Code", Consolas, monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }
    .hero {
      background: linear-gradient(135deg, var(--hero-from) 0%, var(--hero-to) 100%);
      color: #fff;
      padding: 2.5rem 2rem 3rem;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 80% 20%, rgba(99,102,241,.35) 0%, transparent 50%),
                  radial-gradient(circle at 20% 80%, rgba(20,184,166,.2) 0%, transparent 45%);
      pointer-events: none;
    }
    .hero-inner { max-width: 1100px; margin: 0 auto; position: relative; z-index: 1; }
    .brand {
      display: flex; align-items: center; gap: .75rem; margin-bottom: 1.25rem;
    }
    .brand-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: linear-gradient(135deg, #818cf8, #6366f1);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 1.1rem; color: #fff;
      box-shadow: 0 4px 12px rgba(99,102,241,.4);
    }
    .brand-text { font-size: .85rem; opacity: .85; letter-spacing: .05em; text-transform: uppercase; }
    .hero h1 { font-size: 1.85rem; font-weight: 700; letter-spacing: -.02em; margin-bottom: .35rem; }
    .hero-sub { opacity: .8; font-size: .95rem; }
    .hero-meta {
      display: flex; flex-wrap: wrap; gap: 1.25rem; margin-top: 1.5rem;
      font-size: .82rem; opacity: .75;
    }
    .hero-meta span { display: flex; align-items: center; gap: .35rem; }
    .container { max-width: 1100px; margin: -1.5rem auto 3rem; padding: 0 1.25rem; position: relative; z-index: 2; }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .summary-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1.25rem 1rem;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      border-top: 3px solid var(--accent);
      text-align: center;
    }
    .summary-value { font-size: 1.75rem; font-weight: 700; color: var(--accent); line-height: 1.2; }
    .summary-label { font-size: .78rem; color: var(--text-muted); margin-top: .25rem; text-transform: uppercase; letter-spacing: .04em; }
    .panel {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .panel-title {
      font-size: .78rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .06em; color: var(--text-muted); margin-bottom: 1rem;
    }
    .severity-bar {
      display: flex; height: 10px; border-radius: 99px; overflow: hidden;
      background: #f1f5f9; margin-bottom: .75rem;
    }
    .severity-bar.empty { align-items: center; justify-content: center; height: auto; padding: .75rem; color: var(--text-muted); font-size: .9rem; }
    .severity-bar .seg { transition: width .3s; min-width: 4px; }
    .severity-legend { display: flex; flex-wrap: wrap; gap: 1rem; font-size: .82rem; color: var(--text-muted); }
    .legend-item { display: flex; align-items: center; gap: .4rem; }
    .legend-item i { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }
    .section-head {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 1.25rem; flex-wrap: wrap; gap: .5rem;
    }
    .section-head h2 { font-size: 1.15rem; font-weight: 600; }
    .section-head .count { font-size: .85rem; color: var(--text-muted); }
    .findings-list { display: flex; flex-direction: column; gap: 1rem; }
    .finding-card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--sev-border);
      border-left: 4px solid var(--sev-color);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .finding-header {
      display: flex; gap: 1rem; padding: 1.15rem 1.25rem .5rem;
      background: linear-gradient(to right, var(--sev-bg), transparent 60%);
    }
    .finding-rank {
      font-size: .75rem; font-weight: 700; color: var(--sev-color);
      opacity: .7; min-width: 1.5rem; padding-top: .15rem;
    }
    .finding-main { flex: 1; min-width: 0; }
    .finding-badges { display: flex; flex-wrap: wrap; gap: .4rem; margin-bottom: .5rem; align-items: center; }
    .badge-sev {
      background: var(--sev-color); color: #fff;
      font-size: .7rem; font-weight: 700; padding: .15rem .55rem;
      border-radius: 6px; letter-spacing: .03em;
    }
    .tag {
      font-size: .68rem; font-weight: 600; padding: .12rem .5rem;
      border-radius: 6px; letter-spacing: .02em;
    }
    .tag-source { background: color-mix(in srgb, var(--tag-color) 12%, transparent); color: var(--tag-color); border: 1px solid color-mix(in srgb, var(--tag-color) 30%, transparent); }
    .tag-cwe { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
    .tag-cvss { background: #fef3c7; color: #b45309; border: 1px solid #fde68a; }
    .tag-muted { color: var(--text-muted); }
    .finding-title { font-size: 1.05rem; font-weight: 600; line-height: 1.4; margin-bottom: .25rem; word-break: break-word; }
    .finding-meta { font-size: .82rem; color: var(--text-muted); }
    .finding-meta .dot { margin: 0 .25rem; }
    .finding-body { padding: .5rem 1.25rem 1.25rem 3.25rem; }
    .finding-desc { font-size: .92rem; color: #334155; margin-bottom: 1rem; }
    .cvss-vector { margin-top: .35rem; }
    .cvss-vector code { font-size: .75rem; color: #64748b; word-break: break-all; }
    .evidence-block {
      background: #f8fafc; border: 1px solid #e2e8f0;
      border-radius: 10px; padding: .85rem 1rem; margin-bottom: .75rem;
    }
    .flow-evidence { border-left: 3px solid #6366f1; }
    .composite-evidence { border-left: 3px solid #a855f7; }
    .chunk-evidence { border-left: 3px solid #3b82f6; }
    .evidence-title { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); margin-bottom: .5rem; }
    .evidence-text { font-size: .88rem; color: #475569; }
    .flow-steps { list-style: none; margin: 0 0 .75rem; padding: 0; }
    .flow-steps li {
      display: flex; align-items: center; gap: .6rem;
      padding: .35rem 0; font-size: .85rem;
      border-bottom: 1px dashed #e2e8f0;
    }
    .flow-steps li:last-child { border-bottom: none; }
    .step-index {
      width: 22px; height: 22px; border-radius: 50%;
      background: #6366f1; color: #fff; font-size: .7rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .flow-steps code, .location-code {
      font-family: var(--mono); font-size: .8rem;
      background: #fff; padding: .15rem .4rem; border-radius: 4px;
      border: 1px solid #e2e8f0; word-break: break-all;
    }
    .evidence-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: .5rem; margin-bottom: .5rem;
    }
    .evidence-grid .label, .gap-line .label, .recommendation .label {
      display: block; font-size: .68rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .04em; color: var(--text-muted); margin-bottom: .1rem;
    }
    .evidence-grid .value { font-size: .85rem; font-weight: 500; }
    .gap-line { font-size: .82rem; color: #475569; margin-top: .25rem; }
    .recommendation {
      background: #ecfdf5; border: 1px solid #a7f3d0; border-radius: 10px;
      padding: .85rem 1rem; margin-top: .5rem;
    }
    .recommendation p { font-size: .88rem; color: #065f46; margin-top: .25rem; }
    .empty-state {
      text-align: center; padding: 3rem 1rem; color: var(--text-muted);
    }
    .empty-icon {
      width: 56px; height: 56px; border-radius: 50%; background: #ecfdf5;
      color: #10b981; font-size: 1.5rem; line-height: 56px; margin: 0 auto 1rem;
    }
    .footer {
      max-width: 1100px; margin: 0 auto 2rem; padding: 0 1.25rem;
      font-size: .75rem; color: var(--text-muted); text-align: center;
    }
    .footer code { font-size: .7rem; background: #f1f5f9; padding: .1rem .35rem; border-radius: 4px; }
    @media (max-width: 640px) {
      .hero { padding: 1.75rem 1rem 2.5rem; }
      .hero h1 { font-size: 1.4rem; }
      .finding-body { padding-left: 1.25rem; }
      .finding-header { flex-direction: column; gap: .25rem; }
    }
    @media print {
      body { background: #fff; }
      .hero { background: #1e293b !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .finding-card { break-inside: avoid; }
    }
  </style>
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <div class="brand">
        <div class="brand-icon">S</div>
        <span class="brand-text">Skynet Security</span>
      </div>
      <h1>{{REPORT_TITLE}}</h1>
      <p class="hero-sub">项目 <strong>{{PROJECT_NAME}}</strong></p>
      <div class="hero-meta">
        <span>📁 {{REPO_ROOT}}</span>
        <span>🤖 {{MODEL}}</span>
        <span>🕐 {{GENERATED_AT}}</span>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="summary-grid">{{SUMMARY_CARDS}}</div>

    <div class="panel">
      <div class="panel-title">严重度分布</div>
      {{SEVERITY_SECTION}}
    </div>

    <div class="panel">
      <div class="section-head">
        <h2>安全发现</h2>
        <span class="count">共 {{FINDING_COUNT}} 条</span>
      </div>
      <div class="findings-list">{{FINDINGS_HTML}}</div>
    </div>
  </main>

  <footer class="footer">
  </footer>
</body>
</html>
