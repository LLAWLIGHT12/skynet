name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-audit.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        env:
          FALLBACK_LLM_API_KEY: test-key-for-ci-only
          FALLBACK_LLM_API_BASE_URL: https://api.example.com/v1
          FALLBACK_LLM_MODEL_NAME: test-model
        run: |
          pytest tests/ -q --ignore=tests/benchmark --ignore=tests/test_smoke.py --ignore=tests/test_overrides.py
